<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="hsl(245, 58%, 51%)"/>
  <!-- Bot icon (lucide Bot) scaled to fit -->
  <g transform="translate(6, 6) scale(0.833)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head rectangle -->
    <rect x="3" y="11" width="18" height="10" rx="2"/>
    <!-- Eyes -->
    <circle cx="8.5" cy="16" r="1" fill="white" stroke="none"/>
    <circle cx="15.5" cy="16" r="1" fill="white" stroke="none"/>
    <!-- Antenna -->
    <line x1="12" y1="11" x2="12" y2="7"/>
    <circle cx="12" cy="6" r="1" fill="white" stroke="none"/>
    <!-- Arms -->
    <line x1="3" y1="15" x2="1" y2="15"/>
    <line x1="21" y1="15" x2="23" y2="15"/>
    <!-- Legs -->
    <line x1="8" y1="21" x2="8" y2="24"/>
    <line x1="16" y1="21" x2="16" y2="24"/>
  </g>
</svg>
